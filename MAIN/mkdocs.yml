site_name: MG / WWCSI 
site_url: https://docs.mgtraining.net
site_description: Internal training and troubleshooting documentation for MG / WWCSI metrology systems — hardware, software, procedures, and step-by-step guides.
#copyright: Internal documentation — MG / WWCSI Training. Compiled for the team.

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - assets/js/welcome.js
  - assets/js/enhance.js

theme:
  name: material
  custom_dir: overrides
  logo: Dark-Logo.png
  favicon: Dark-Logo.png
  icon:
    admonition:
      announcement: material/bullhorn
  palette:
    # Dark mode (default — matches the Cloudflare-style look)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode

    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share

extra:
  generator: false

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - def_list
  - toc:
      permalink: false
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: docs
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

not_in_nav: |
  /snippets/
  /videos/test.md
  /simulator/README.md

nav:
  - Home: index.md

  - Documentation:
      - Hardware:
          - Ballbar: documentation/hardware/ballbar/ballbar.md
          - Probehead: documentation/hardware/probehead/probehead.md
          - Squaring a Probehead: documentation/hardware/probehead/phsquare/phsquare.md
          - Servo Amps: documentation/hardware/servoamps/servoamps.md
          - Eurocard Tuning: documentation/hardware/servoamps/eurocard/eurocard.md
          - Soldering: documentation/hardware/soldering/soldering.md
      - Software:
          - CMES Commands: documentation/software/CMEScommands/CMEScommands.md
          - Variables: documentation/software/variables/variables.md
          - Camio Config: documentation/software/variables/camio/camioconfig.md
      - Step By Steps:
          - Calibration: documentation/stepbysteps/sub/Calibration.md
          - Laser Straightness Setup: documentation/stepbysteps/sub/laserstraight.md
          - Soldering: documentation/stepbysteps/sub/soldering/soldering.md
          - Twin Column Alignment: documentation/stepbysteps/sub/TCAlignment.md
      - Procedures:
          - Calibration: documentation/Procedures/calibration/calibration.md
      - Important:
          - License Updates: important/licenseupdates.md
          - Remote Keys & IDs: important/remotekeys.md
          - Links: important/links.md
          - Reference Videos: important/videos.md

  - Videos: videos.md
  - Simulation: sim.md

  - Training:
      - training/start.md

  - Random:
      - Cursed: Home/cursed.md
      - Travel: Home/travel.md