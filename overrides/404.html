{% extends "base.html" %}

{% block content %}
<div style="text-align:center; padding:4rem 1rem; max-width:40rem; margin:0 auto;">
  <h1 style="font-size:5rem; margin:0; font-weight:800; color:var(--md-accent-fg-color); letter-spacing:-0.03em;">404</h1>
  <h2 style="margin:.25rem 0 1rem;">This page wandered off</h2>
  <p style="opacity:.8;">
    The page you're after doesn't exist (or moved). Try the search up top —
    it's the fastest way to find anything on the site — or head back to the start.
  </p>
  <p style="margin-top:1.6rem;">
    <a class="md-button mg-primary" href="{{ '/' | url }}">Back to Home</a>
  </p>
</div>
{% endblock %}
